apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-dashboard-role
rules:
- apiGroups: [""]
  resources:
    - pods
    - pods/log   # 🔥 THIS IS MISSING
    - services
    - namespaces
    - nodes
    - events
  verbs:
    - get
    - list
    - watch

- apiGroups: ["apps"]
  resources:
    - deployments
    - replicasets
  verbs:
    - get
    - list
    - watch
