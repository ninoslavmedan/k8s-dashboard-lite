<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Kubernetes Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>

        body {
            background-color: #0f172a;
            color: white;
        }

        .sidebar {
            width: 240px;
            min-height: 100vh;
            background: #111827;
        }

        .sidebar a {
            color: #cbd5e1;
            text-decoration: none;
            display: block;
            padding: 12px 20px;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        .main-content {
            flex-grow: 1;
            padding: 30px;
        }

        .dashboard-card {
            border: none;
            border-radius: 15px;
            background: #1e293b;
            color: white;
        }

        .dashboard-card h2 {
            font-weight: bold;
        }

        .navbar-dark {
            background: #111827;
        }

    </style>

</head>
<body>

<nav class="navbar navbar-dark px-3">
    <span class="navbar-brand mb-0 h1">
        <i class="bi bi-boxes"></i>
        Kubernetes Dashboard
    </span>
</nav>

<div class="d-flex">

    <div class="sidebar">

        <h5 class="p-3">Navigation</h5>

        <a href="/?ns={{ selected_ns }}">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="/pods?ns={{ selected_ns }}">
            <i class="bi bi-hdd-network"></i>
            Pods
        </a>

        <a href="/deployments?ns={{ selected_ns }}">
            <i class="bi bi-grid"></i>
            Deployments
        </a>

        <a href="/services?ns={{ selected_ns }}">
            <i class="bi bi-diagram-3"></i>
            Services
        </a>

    </div>

    <div class="main-content">

        {% block content %}
        {% endblock %}

    </div>

</div>

</body>
</html>
