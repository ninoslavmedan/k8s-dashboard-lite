<!DOCTYPE html>
<html>
<head>
    <title>{{ app_name }} - {{ version }}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            position: fixed;
            background: #111827;
            padding: 15px;
        }

        .content {
            margin-left: 240px;
            padding: 20px;
        }

        a {
            color: #60a5fa;
            text-decoration: none;
            display: block;
            padding: 8px 0;
        }

        a:hover {
            color: white;
        }

        .card {
            background: #1e293b;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        td, th {
            padding: 10px;
            border-bottom: 1px solid #334155;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h3>{{ app_name }}</h3>
    <small>{{ version }}</small>

    <hr>

    <a href="/">🏠 Dashboard</a>
    <a href="/pods?ns={{ selected_ns }}">📦 Pods</a>
    <a href="/deployments?ns={{ selected_ns }}">🚀 Deployments</a>
    <a href="/services?ns={{ selected_ns }}">🌐 Services</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
