<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{ app_name }} {{ version }}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--sidebar:#132835;--hover:#1f3d4f;--accent:#00b8d4;--bg:#eef3f7;--card:#fff;--text:#2f3e4d;--muted:#7c8b99;--border:#dde5ec;}
*{box-sizing:border-box} body{margin:0;font-family:Segoe UI,Arial;background:var(--bg);color:var(--text)}
.sidebar{position:fixed;left:0;top:0;width:260px;height:100%;background:var(--sidebar);color:white}
.logo{padding:24px}.version{background:var(--accent);padding:4px 10px;border-radius:20px;font-size:12px}
.menu a{display:block;padding:14px 24px;color:#dbe7ef;text-decoration:none}
.menu a:hover{background:var(--hover);border-left:4px solid var(--accent)}
.menu i{width:24px}.content{margin-left:260px;padding:24px}
.topbar,.card,.table-card{background:white;border-radius:10px;box-shadow:0 1px 6px rgba(0,0,0,.08)}
.topbar{padding:16px;margin-bottom:20px}.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px}
.card{padding:20px}.metric{font-size:34px;font-weight:bold;color:var(--accent)}
.card-icon{font-size:30px;color:var(--accent);margin-bottom:10px}
.table-card{padding:18px} table{width:100%;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left}
th{background:#f7fafc}.badge{padding:4px 10px;border-radius:20px;font-size:12px}
.run{background:#dff7ea;color:#008d4c}.pend{background:#fff4d8;color:#cc8a00}.fail{background:#ffe1e1;color:#c62828}
.btn{background:var(--accent);color:white;padding:8px 12px;border-radius:5px;text-decoration:none}
</style>
</head>
<body>
<div class="sidebar">
<div class="logo">
<h2><i class="fa-solid fa-cubes"></i> {{ app_name }}</h2>
<span class="version">{{ version }}</span>
</div>
<div class="menu">
<a href="/?ns={{ selected_ns }}"><i class="fa-solid fa-chart-line"></i> Overview</a>
<a href="/pods?ns={{ selected_ns }}"><i class="fa-solid fa-cube"></i> Pods</a>
<a href="/deployments?ns={{ selected_ns }}"><i class="fa-solid fa-rocket"></i> Deployments</a>
<a href="/services?ns={{ selected_ns }}"><i class="fa-solid fa-network-wired"></i> Services</a>
</div>
</div>
<div class="content">
<div class="topbar">
<form method="get">
<i class="fa-solid fa-layer-group"></i>
<select name="ns" onchange="this.form.submit()">
{% for n in namespaces %}
<option value="{{ n }}" {% if n==selected_ns %}selected{% endif %}>{{ n }}</option>
{% endfor %}
</select>
</form>
</div>
{% block content %}{% endblock %}
</div>
</body>
</html>
