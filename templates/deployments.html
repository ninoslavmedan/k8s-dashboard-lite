{% extends "base.html" %}

{% block content %}

<h1 style="margin-bottom:20px;">Deployments</h1>

<div class="table-card">

<table>

<tr>
    <th>Name</th>
    <th>Replicas</th>
</tr>

{% for d in deployments %}
<tr>
    <td>{{ d.metadata.name }}</td>
    <td>{{ d.spec.replicas }}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
