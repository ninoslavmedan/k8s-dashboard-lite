{% extends "base.html" %}

{% block content %}

<h1 style="margin-bottom:20px;">Cluster Overview</h1>

<div class="card-grid">

    <div class="card">
        <h3>Pods</h3>
        <div class="metric">{{ pods }}</div>
    </div>

    <div class="card">
        <h3>Deployments</h3>
        <div class="metric">{{ deployments }}</div>
    </div>

    <div class="card">
        <h3>Services</h3>
        <div class="metric">{{ services }}</div>
    </div>

</div>

{% endblock %}
