<h1>Kubernetes Dashboard</h1>

<form method="GET" action="/">
  <label>Namespace:</label>
  <select name="ns" onchange="this.form.submit()">
    {% for n in namespaces %}
      <option value="{{ n }}" {% if n == selected_ns %}selected{% endif %}>
        {{ n }}
      </option>
    {% endfor %}
  </select>
</form>

<hr>

<ul>
  <li>Pods: {{ pods }}</li>
  <li>Deployments: {{ deployments }}</li>
  <li>Services: {{ services }}</li>
</ul>

<hr>

<a href="/pods?ns={{ selected_ns }}">Pods</a><br>
<a href="/deployments?ns={{ selected_ns }}">Deployments</a><br>
<a href="/services?ns={{ selected_ns }}">Services</a><br>
