<!DOCTYPE html>
<html>
<head>
    <title>{{ app_name }}</title>
    <style>
        body { font-family: Arial; background:#0f172a; color:white; }
        .box { background:#1e293b; padding:15px; margin:10px; border-radius:10px; }
        .row { display:flex; gap:10px; }
    </style>
</head>
<body>

<h2>{{ app_name }} - {{ version }}</h2>

<div class="box">
    Namespace: {{ selected_ns }}
</div>

<div class="row">
    <div class="box">Pods: {{ pods }}</div>
    <div class="box">Deployments: {{ deployments }}</div>
    <div class="box">Services: {{ services }}</div>
</div>

<div class="box">
    <h3>Namespaces</h3>
    <ul>
        {% for ns in namespaces %}
        <li>{{ ns }}</li>
        {% endfor %}
    </ul>
</div>

</body>
</html>
